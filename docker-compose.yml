services:
  admin-server:
    build:
      context: ./admin-server
      dockerfile: Dockerfile
    container_name: telegram-admin-server
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - DB_USERNAME=${DB_USERNAME:-sa}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-TelegramAdminSecretKey2024ForJWTTokenGeneration1234567890ABCDEF}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@telegram.local}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-production}
    volumes:
      - admin-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/client/configs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  admin-data:
    driver: local
