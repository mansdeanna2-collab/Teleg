name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version from gradle.properties
        id: version
        run: |
          if [ ! -f gradle.properties ]; then
            echo "ERROR: gradle.properties not found"
            exit 1
          fi
          APP_VERSION_NAME=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')
          APP_VERSION_CODE=$(grep '^APP_VERSION_CODE=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')
          if [ -z "$APP_VERSION_NAME" ] || [ -z "$APP_VERSION_CODE" ]; then
            echo "ERROR: Failed to read APP_VERSION_NAME or APP_VERSION_CODE from gradle.properties"
            exit 1
          fi
          echo "version_name=${APP_VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${APP_VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "Building v${APP_VERSION_NAME} (code: ${APP_VERSION_CODE})"

      - name: Clean stale build artifacts
        run: |
          echo "Cleaning stale build caches to prevent version mismatch..."
          rm -rf TMessagesProj/build TMessagesProj_App/build TMessagesProj_AppStandalone/build
          rm -rf TMessagesProj_AppHuawei/build TMessagesProj_AppHockeyApp/build TMessagesProj_AppTests/build
          rm -rf TMessagesProj/.cxx build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Android build environment image
        run: docker build -t telegram-app-builder -f Dockerfile .

      - name: Build APKs
        run: |
          docker run --rm \
            -v "$(pwd):/home/source" \
            telegram-app-builder

      - name: Collect APK artifacts
        run: |
          mkdir -p output/apk output/bundle
          VERSION="${{ steps.version.outputs.version_name }}"
          APK_BASE="TMessagesProj/build/outputs/apk"
          BUNDLE_BASE="TMessagesProj/build/outputs/bundle"

          # Collect all APK files from the Docker build output
          # Gradle output structure: afat/release/app.apk, afat/standalone/app.apk, afat/release/app-huawei.apk
          apk_count=0
          while IFS= read -r apk_file; do
            apk_basename=$(basename "$apk_file" .apk)
            relative_path="${apk_file#${APK_BASE}/}"
            variant_dir=$(dirname "$relative_path")

            if [ "$apk_basename" != "app" ]; then
              variant_name="${apk_basename#app-}"
            else
              variant_name=$(basename "$variant_dir")
            fi
            target_name="telegram-v${VERSION}-${variant_name}.apk"

            cp "$apk_file" "output/apk/${target_name}"
            echo "Collected: ${target_name}"
            apk_count=$((apk_count + 1))
          done < <(find "${APK_BASE}/" -name "*.apk" 2>/dev/null)

          # Collect AAB bundles
          if [ -d "$BUNDLE_BASE" ]; then
            while IFS= read -r aab_file; do
              aab_relative="${aab_file#${BUNDLE_BASE}/}"
              aab_variant_dir=$(dirname "$aab_relative")
              aab_variant_name=$(echo "$aab_variant_dir" | tr '/' '-' | sed 's/^-*//;s/-*$//;s/--*/-/g')
              target_name="telegram-v${VERSION}-${aab_variant_name}.aab"

              cp "$aab_file" "output/bundle/${target_name}"
              echo "Collected: ${target_name}"
            done < <(find "${BUNDLE_BASE}/" -name "*.aab" 2>/dev/null)
          fi

          echo "=== Built APKs (${apk_count}) ==="
          ls -lh output/apk/ 2>/dev/null || echo "No APKs found"
          echo "=== Built AABs ==="
          ls -lh output/bundle/ 2>/dev/null || echo "No AABs found"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telegram-apk-v${{ steps.version.outputs.version_name }}
          path: output/apk/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload AAB artifacts
        uses: actions/upload-artifact@v4
        if: hashFiles('output/bundle/*.aab') != ''
        with:
          name: telegram-aab-v${{ steps.version.outputs.version_name }}
          path: output/bundle/*.aab
          if-no-files-found: warn
          retention-days: 30
