server:
  port: 8080

spring:
  application:
    name: telegram-admin-server
  datasource:
    url: jdbc:h2:file:./data/admin-db
    driver-class-name: org.h2.Driver
    username: sa
    password: admin123
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

admin:
  jwt:
    secret: TelegramAdminSecretKey2024ForJWTTokenGeneration1234567890ABCDEF
    expiration-ms: 86400000
  default-admin:
    username: admin
    password: admin123
    email: admin@telegram.local
