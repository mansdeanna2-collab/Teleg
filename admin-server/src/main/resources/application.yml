server:
  port: 8080

spring:
  application:
    name: telegram-admin-server
  datasource:
    url: jdbc:h2:file:./data/admin-db
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:admin123}
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

admin:
  jwt:
    secret: ${JWT_SECRET:TelegramAdminSecretKey2024ForJWTTokenGeneration1234567890ABCDEF}
    expiration-ms: 86400000
  default-admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
    email: ${ADMIN_EMAIL:admin@telegram.local}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:8080,http://localhost:3000}
